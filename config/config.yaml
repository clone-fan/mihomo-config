# mihomo-config · smart config (sanitized)
# Source: 10.0.0.2 /etc/mihomo/config.yaml
# Repo: https://github.com/clone-fan/mihomo-config
# Replace: REPLACE_ME_AIRPORT_SUBSCRIPTION_URL / REPLACE_ME_SS_PASSWORD / NIC / ports
# mihomo smart: https://github.com/vernesong/mihomo/releases

############################################## - ⚓️ 锚点区开始 - ##############################################

# 锚点 - 远程订阅组
PProviders: &PP                    {type: http, interval: 3600, proxy: DIRECT, health-check: {enable: true, url: 'https://detectportal.firefox.com/success.txt', interval: 600}, filter: '^(?!.*(群|卡顿|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'}
# 锚点 - 策略组
SelectProxy: &SP                   {type: select, proxies: [默认代理, 狮城策略, 日本策略, 美国策略, cf优选, VPS节点, 全部节点, DIRECT]}
SelectDefault: &SD                 {type: select, proxies: [香港策略, 狮城策略, 日本策略, 美国策略, cf优选, VPS节点, 全部节点, DIRECT]}
SelectNode: &SN                    {type: select, proxies: [香港节点, 狮城节点, 日本节点, 美国节点, cf优选, VPS节点, 全部节点, DIRECT]}
SelectBlack: &SB                   {type: select, proxies: [DIRECT, REJECT, 默认代理, 全部节点]}
# 锚点 - 时延参数
TypeSmart: &TA                     {type: smart, interval: 60, lazy: true, timeout: 2000, hidden: true , max-failed-times: 2, uselightgbm: false, collectdata: false, strategy: sticky-sessions, sampling-window: 10, url: "https://detectportal.firefox.com/success.txt"}
TypeLoadBalanceCH: &TB             {type: load-balance, interval: 60, lazy: true, timeout: 2000, hidden: true, include-all: true, disable-udp: false, max-failed-times: 2, strategy: consistent-hashing, url: 'https://detectportal.firefox.com/success.txt'}
TypeUrlTest: &TU                   {type: url-test, interval: 60, lazy: true, timeout: 2000, hidden: true, include-all: true, disable-udp: false, max-failed-times: 2, tolerance: 50, url: 'https://detectportal.firefox.com/success.txt'}
TypeSelect: &TS                    {type: select, hidden: false, include-all: true}
# 锚点 - 地区
FilterHK: &HK                      "^(?=.*(?i)(港|🇭🇰))(?!.*(?i)VPS).*$"
FilterSG: &SG                      "^(?=.*(?i)(坡|🇸🇬))(?!.*(?i)VPS).*$"
FilterJP: &JP                      "^(?=.*(?i)(日|🇯🇵))(?!.*(?i)VPS).*$"
FilterUS: &US                      "^(?=.*(?i)(美|🇺🇸))(?!.*(?i)VPS).*$"
FilterVPS: &VPS                    "^.*(?i)VPS.*$"
FilterCF: &CF                      "^.*(?i)CF.*$"
FilterAll: &All                    "^(?!.*(DIRECT|REJECT|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|过滤|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))"
# 锚点 - 规则集
RulesetIPcidrMrs: &RIM             {type: http, interval: 86400, behavior: ipcidr, format: mrs}
RulesetDomainMrs: &RDM             {type: http, interval: 86400, behavior: domain, format: mrs}

############################################## - ⚓️ 锚点区结束 - ############################################## 

#回家
listeners:
  - {name: SS-IN, type: shadowsocks, listen: '::', port: 51303, udp: true, password: "REPLACE_ME_SS_PASSWORD", cipher: 2022-blake3-aes-128-gcm}

#机场订阅
proxy-providers:
  Airport1: {<<: *PP, url: 'REPLACE_ME_AIRPORT_SUBSCRIPTION_URL'}

# 全局配置
# 仅供参考，建议用你自己的配置覆盖
routing-mark: 1
interface-name: ens18
mixed-port: 9555
socks-port: 9666
redir-port: 9777
tproxy-port: 9888
log-level: info
authentication: [""]
allow-lan: true
bind-address: "*"
ipv6: true
mode: rule
find-process-mode: "strict"
tcp-concurrent: true
udp: true
unified-delay: true
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
geodata-mode: false
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
external-ui: "/etc/mihomo/ui"
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

# 嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.*"
  skip-domain:
    - Mijia Cloud

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:9999
  use-hosts: true
  prefer-h3: false
  ipv6: true
  ipv6-timeout: 300
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.0/8
              #  2001:2::/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  default-nameserver:
    - tls://223.5.5.5
  proxy-server-nameserver:
    - tls://223.5.5.5
  direct-nameserver:
    - tls://223.5.5.5
  direct-nameserver-follow-policy: false
  nameserver:
    - tls://8.8.8.8
    - tls://1.1.1.1

  # 自定义 DNS 覆写 (Hosts)
hosts:
  'anyrouter.top': '47.246.23.200'

